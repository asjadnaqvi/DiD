{% if page.mathjax %}
  <script type="text/x-mathjax-config">
    {{ site.mathjax.config }};
  </script>
  <script type="text/javascript" async 
    src="{{ site.mathjax.source }}">
  </script>
{% endif %}

<style>
/* Improve use of horizontal space on large screens while keeping pages readable. */
@media (min-width: 66.5rem) {
  .main-content-wrap {
    max-width: min(124rem, calc(100vw - 18.5rem));
  }
}

@media (min-width: 90rem) {
  .side-bar {
    width: 17rem;
  }

  .main {
    margin-left: 17rem;
  }

  .main-content-wrap {
    max-width: min(136rem, calc(100vw - 20rem));
  }
}

/* Let wide tables use available space and scroll gracefully when needed. */
.main-content table {
  width: 100%;
  display: block;
  overflow-x: auto;
}
</style>
